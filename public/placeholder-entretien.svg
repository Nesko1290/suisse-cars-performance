<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#DA291C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Oil drop -->
  <g transform="translate(500, 380)" fill="rgba(255,255,255,0.92)">
    <path d="M 0 -100 Q 60 -20 60 30 Q 60 80 0 80 Q -60 80 -60 30 Q -60 -20 0 -100 Z"/>
    <ellipse cx="-20" cy="-20" rx="12" ry="18" fill="rgba(176,0,26,0.5)"/>
  </g>

  <!-- Filter icon -->
  <g transform="translate(750, 450)" stroke="rgba(255,255,255,0.85)" stroke-width="3" fill="none">
    <rect x="-60" y="-80" width="120" height="160" rx="8"/>
    <line x1="-60" y1="-40" x2="60" y2="-40"/>
    <line x1="-60" y1="0" x2="60" y2="0"/>
    <line x1="-60" y1="40" x2="60" y2="40"/>
    <line x1="-40" y1="-80" x2="-40" y2="80"/>
    <line x1="0" y1="-80" x2="0" y2="80"/>
    <line x1="40" y1="-80" x2="40" y2="80"/>
  </g>

  <!-- Checklist decoration -->
  <g transform="translate(250, 600)" stroke="rgba(176,0,26,0.55)" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M 0 0 L 12 12 L 32 -8"/>
    <line x1="50" y1="2" x2="140" y2="2"/>
    <path d="M 0 40 L 12 52 L 32 32"/>
    <line x1="50" y1="42" x2="120" y2="42"/>
    <path d="M 0 80 L 12 92 L 32 72"/>
    <line x1="50" y1="82" x2="130" y2="82"/>
  </g>

  <!-- Corner accents -->
  <g stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none">
    <path d="M 50 50 L 50 100 M 50 50 L 100 50"/>
    <path d="M 1150 50 L 1150 100 M 1150 50 L 1100 50"/>
    <path d="M 50 850 L 50 800 M 50 850 L 100 850"/>
    <path d="M 1150 850 L 1150 800 M 1150 850 L 1100 850"/>
  </g>

  <text x="600" y="150" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="18" font-weight="500" letter-spacing="10" fill="rgba(255,255,255,0.55)">ENTRETIEN COURANT</text>
  <text x="600" y="820" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="14" font-weight="300" letter-spacing="6" fill="rgba(255,255,255,0.5)">PHOTO À VENIR</text>
</svg>
