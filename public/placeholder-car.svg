<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="50%" stop-color="#DA291C"/>
      <stop offset="100%" stop-color="#B0001A"/>
    </linearGradient>
    <linearGradient id="car-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8EEF5"/>
      <stop offset="45%" stop-color="#D6B5B5"/>
      <stop offset="100%" stop-color="#8FA1B3"/>
    </linearGradient>
    <radialGradient id="spotlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#grid)"/>
  <rect width="1600" height="1000" fill="url(#spotlight)"/>

  <!-- Floor shadow -->
  <ellipse cx="800" cy="820" rx="520" ry="28" fill="rgba(0,0,0,0.35)"/>

  <!-- Car silhouette: luxury sedan profile -->
  <g transform="translate(280, 360)">
    <!-- Body main -->
    <path d="M 20 260
             Q 40 180 100 160
             L 200 140
             Q 260 80 360 68
             L 680 68
             Q 780 80 830 140
             L 930 160
             Q 990 180 1020 230
             L 1020 300
             L 20 300
             Z"
          fill="url(#car-body)"/>
    <!-- Greenhouse/windows -->
    <path d="M 230 140
             Q 280 90 360 82
             L 680 82
             Q 760 90 810 140
             L 800 200
             L 240 200
             Z"
          fill="rgba(10,37,64,0.55)"/>
    <!-- Window dividers -->
    <line x1="440" y1="90" x2="440" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <line x1="580" y1="90" x2="580" y2="200" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <!-- Door lines -->
    <line x1="460" y1="200" x2="460" y2="280" stroke="rgba(10,37,64,0.35)" stroke-width="1.5"/>
    <line x1="620" y1="200" x2="620" y2="280" stroke="rgba(10,37,64,0.35)" stroke-width="1.5"/>
    <!-- Headlight -->
    <ellipse cx="990" cy="230" rx="28" ry="10" fill="#FFFEF2" opacity="0.9"/>
    <!-- Taillight -->
    <ellipse cx="50" cy="230" rx="22" ry="8" fill="#CC3040" opacity="0.85"/>
    <!-- Mirror -->
    <rect x="278" y="150" width="30" height="18" rx="4" fill="url(#car-body)"/>

    <!-- Wheels -->
    <g transform="translate(180, 270)">
      <circle cx="0" cy="0" r="68" fill="#0A1020"/>
      <circle cx="0" cy="0" r="58" fill="#1a2232"/>
      <circle cx="0" cy="0" r="28" fill="#E8EEF5"/>
      <circle cx="0" cy="0" r="10" fill="#DA291C"/>
      <g stroke="#E8EEF5" stroke-width="4" fill="none">
        <line x1="-54" y1="0" x2="-28" y2="0"/>
        <line x1="54" y1="0" x2="28" y2="0"/>
        <line x1="0" y1="-54" x2="0" y2="-28"/>
        <line x1="0" y1="54" x2="0" y2="28"/>
        <line x1="-38" y1="-38" x2="-20" y2="-20"/>
        <line x1="38" y1="38" x2="20" y2="20"/>
        <line x1="-38" y1="38" x2="-20" y2="20"/>
        <line x1="38" y1="-38" x2="20" y2="-20"/>
      </g>
    </g>
    <g transform="translate(870, 270)">
      <circle cx="0" cy="0" r="68" fill="#0A1020"/>
      <circle cx="0" cy="0" r="58" fill="#1a2232"/>
      <circle cx="0" cy="0" r="28" fill="#E8EEF5"/>
      <circle cx="0" cy="0" r="10" fill="#DA291C"/>
      <g stroke="#E8EEF5" stroke-width="4" fill="none">
        <line x1="-54" y1="0" x2="-28" y2="0"/>
        <line x1="54" y1="0" x2="28" y2="0"/>
        <line x1="0" y1="-54" x2="0" y2="-28"/>
        <line x1="0" y1="54" x2="0" y2="28"/>
        <line x1="-38" y1="-38" x2="-20" y2="-20"/>
        <line x1="38" y1="38" x2="20" y2="20"/>
        <line x1="-38" y1="38" x2="-20" y2="20"/>
        <line x1="38" y1="-38" x2="20" y2="-20"/>
      </g>
    </g>
  </g>

  <!-- Corner accents -->
  <g stroke="rgba(255,255,255,0.55)" stroke-width="2" fill="none">
    <path d="M 60 60 L 60 120 M 60 60 L 120 60"/>
    <path d="M 1540 60 L 1540 120 M 1540 60 L 1480 60"/>
    <path d="M 60 940 L 60 880 M 60 940 L 120 940"/>
    <path d="M 1540 940 L 1540 880 M 1540 940 L 1480 940"/>
  </g>

  <!-- Text -->
  <text x="800" y="920" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="28" font-weight="300" letter-spacing="12" fill="rgba(255,255,255,0.65)">PHOTO À VENIR</text>
  <text x="800" y="82" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="16" font-weight="500" letter-spacing="8" fill="rgba(255,255,255,0.5)">SUISSE CARS PERFORMANCE</text>
</svg>
