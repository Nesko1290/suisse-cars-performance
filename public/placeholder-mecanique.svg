<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#DA291C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Wrench crossed with screwdriver -->
  <g transform="translate(600, 450)" stroke="rgba(255,255,255,0.9)" stroke-width="4" fill="none" stroke-linecap="round">
    <!-- Wrench -->
    <g transform="rotate(45)">
      <path d="M -180 0 L -60 0"/>
      <path d="M -60 -25 L -30 -25 Q -5 -25 -5 0 Q -5 25 -30 25 L -60 25 Z" fill="rgba(255,255,255,0.15)"/>
      <circle cx="-20" cy="0" r="10"/>
      <rect x="-200" y="-10" width="30" height="20" rx="3" fill="rgba(255,255,255,0.15)"/>
    </g>
    <!-- Screwdriver -->
    <g transform="rotate(-45)">
      <rect x="-180" y="-10" width="80" height="20" rx="3" fill="rgba(255,255,255,0.15)"/>
      <path d="M -100 -6 L 40 -6 L 40 6 L -100 6 Z" fill="rgba(255,255,255,0.15)"/>
      <path d="M 40 -8 L 60 0 L 40 8 Z" fill="rgba(255,255,255,0.9)"/>
    </g>
  </g>

  <!-- Gear decoration -->
  <g transform="translate(900, 300)" fill="rgba(176,0,26,0.45)">
    <circle cx="0" cy="0" r="70"/>
    <circle cx="0" cy="0" r="30" fill="#1A1A1A"/>
    <g>
      <rect x="-10" y="-90" width="20" height="30" rx="3"/>
      <rect x="-10" y="60" width="20" height="30" rx="3"/>
      <rect x="-90" y="-10" width="30" height="20" rx="3"/>
      <rect x="60" y="-10" width="30" height="20" rx="3"/>
    </g>
    <g transform="rotate(45)">
      <rect x="-10" y="-90" width="20" height="30" rx="3"/>
      <rect x="-10" y="60" width="20" height="30" rx="3"/>
      <rect x="-90" y="-10" width="30" height="20" rx="3"/>
      <rect x="60" y="-10" width="30" height="20" rx="3"/>
    </g>
  </g>

  <!-- Small gear -->
  <g transform="translate(300, 600)" fill="rgba(255,255,255,0.25)">
    <circle cx="0" cy="0" r="45"/>
    <circle cx="0" cy="0" r="18" fill="#1A1A1A"/>
    <g>
      <rect x="-6" y="-58" width="12" height="20" rx="2"/>
      <rect x="-6" y="38" width="12" height="20" rx="2"/>
      <rect x="-58" y="-6" width="20" height="12" rx="2"/>
      <rect x="38" y="-6" width="20" height="12" rx="2"/>
    </g>
  </g>

  <!-- Corner accents -->
  <g stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none">
    <path d="M 50 50 L 50 100 M 50 50 L 100 50"/>
    <path d="M 1150 50 L 1150 100 M 1150 50 L 1100 50"/>
    <path d="M 50 850 L 50 800 M 50 850 L 100 850"/>
    <path d="M 1150 850 L 1150 800 M 1150 850 L 1100 850"/>
  </g>

  <text x="600" y="150" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="18" font-weight="500" letter-spacing="10" fill="rgba(255,255,255,0.55)">MÉCANIQUE & SERVICE</text>
  <text x="600" y="820" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="14" font-weight="300" letter-spacing="6" fill="rgba(255,255,255,0.5)">PHOTO À VENIR</text>
</svg>
