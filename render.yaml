# Render.com deployment config — auto-detected on git push
# https://render.com/docs/yaml-spec
services:
  - type: web
    name: suisse-cars-performance
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    healthCheckPath: /healthz
    autoDeploy: true
