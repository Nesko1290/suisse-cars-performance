<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Détail véhicule — Suisse Cars Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --obsidian: #07090D;
    --carbon: #0E1218;
    --graphite: #171C24;
    --ivory: #F4F0E6;
    --smoke: #B8B5AD;
    --gold: #C8A66B;
    --gold-glow: #E8C584;
    --spring: cubic-bezier(.16,1,.3,1);
    --maxw: 1360px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', system-ui, sans-serif; background: var(--obsidian); color: var(--ivory); font-weight: 300; -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }
  img { max-width: 100%; display: block; }
  .container { max-width: var(--maxw); margin: 0 auto; padding: 0 clamp(20px, 4vw, 56px); }
  body::before {
    content:''; position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    opacity: 0.035; mix-blend-mode: overlay;
  }

  /* NAV (shared) */
  nav.top { position: fixed; top: 0; left: 0; right: 0; z-index: 50; padding: 14px 0; backdrop-filter: blur(24px) saturate(140%); background: rgba(7,9,13,0.85); border-bottom: 1px solid rgba(200,166,107,0.12); }
  nav.top .row { display: flex; align-items: center; justify-content: space-between; gap: 24px; max-width: var(--maxw); margin: 0 auto; padding: 0 clamp(20px, 4vw, 56px); }
  .brand { display: flex; align-items: center; gap: 14px; font-weight: 600; letter-spacing: 0.14em; font-size: 14px; text-transform: uppercase; }
  .brand .mark { width: 36px; height: 36px; display: grid; place-items: center; border: 1px solid var(--gold); color: var(--gold); font-weight: 700; font-size: 16px; }
  .brand-name { display: flex; flex-direction: column; line-height: 1.1; }
  .brand-name strong { color: var(--ivory); font-weight: 600; }
  .brand-name span { color: var(--gold); font-size: 10px; letter-spacing: 0.3em; }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a { font-size: 13px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--smoke); }
  .nav-links a:hover { color: var(--ivory); }
  .cta-btn { display: inline-flex; align-items: center; gap: 10px; padding: 12px 22px; border: 1px solid var(--gold); color: var(--ivory); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; font-weight: 500; background: transparent; cursor: pointer; transition: all .4s var(--spring); position: relative; overflow: hidden; }
  .cta-btn::before { content:''; position:absolute; inset:0; background:var(--gold); transform:translateX(-101%); transition:transform .5s var(--spring); z-index:-1; }
  .cta-btn:hover { color: var(--obsidian); }
  .cta-btn:hover::before { transform: translateX(0); }
  .cta-btn.solid { background: var(--gold); color: var(--obsidian); }
  .cta-btn.solid::before { background: var(--ivory); }

  /* DETAIL */
  .detail-head { padding: 120px 0 0; }
  .breadcrumb { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--smoke); margin-bottom: 32px; }
  .breadcrumb a:hover { color: var(--gold); }
  .d-top { display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: end; margin-bottom: 40px; }
  .d-top .brand-line { font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .d-top h1 { font-size: clamp(36px, 4.5vw, 62px); font-weight: 200; letter-spacing: -0.02em; line-height: 1; margin-bottom: 12px; }
  .d-top .meta { font-size: 14px; color: var(--smoke); }
  .d-top .price-box { text-align: right; }
  .d-top .price-box .lbl { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--smoke); }
  .d-top .price-box .big { font-size: 42px; font-weight: 300; letter-spacing: -0.02em; color: var(--gold); display: block; margin-top: 4px; }

  /* GALLERY */
  .gallery {
    display: grid; grid-template-columns: 3fr 1fr; gap: 16px; margin-bottom: 56px;
  }
  .gallery .main {
    aspect-ratio: 16/10; overflow: hidden; background: var(--graphite); position: relative;
  }
  .gallery .main img { width: 100%; height: 100%; object-fit: cover; }
  .gallery .thumbs { display: grid; grid-template-rows: repeat(4, 1fr); gap: 16px; }
  .gallery .thumbs .t { aspect-ratio: 4/3; overflow: hidden; background: var(--graphite); cursor: pointer; opacity: 0.6; transition: opacity .3s var(--spring); }
  .gallery .thumbs .t:hover, .gallery .thumbs .t.on { opacity: 1; }
  .gallery .thumbs .t img { width: 100%; height: 100%; object-fit: cover; }

  /* CONTENT GRID */
  .d-grid { display: grid; grid-template-columns: 1fr 380px; gap: 56px; padding-bottom: 140px; }

  .d-section { margin-bottom: 56px; }
  .d-section h2 { font-size: 28px; font-weight: 300; letter-spacing: -0.01em; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid rgba(200,166,107,0.2); }
  .d-section h2 em { color: var(--gold); font-style: normal; font-weight: 500; }

  .spec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: rgba(200,166,107,0.12); border: 1px solid rgba(200,166,107,0.12); }
  .spec-cell { padding: 22px 24px; background: var(--carbon); }
  .spec-cell .l { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--smoke); margin-bottom: 8px; }
  .spec-cell .v { font-size: 16px; color: var(--ivory); }

  .opts-list {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px 32px; list-style: none;
  }
  .opts-list li {
    padding: 14px 0; border-bottom: 1px solid rgba(244,240,230,0.06);
    display: flex; align-items: center; gap: 14px; color: var(--ivory); font-size: 15px;
  }
  .opts-list li::before {
    content: '✓'; color: var(--gold); font-weight: 500; width: 20px; height: 20px;
    display: grid; place-items: center; border: 1px solid var(--gold); font-size: 11px;
  }

  .desc-box {
    padding: 32px 36px; background: var(--carbon); border-left: 2px solid var(--gold);
    color: var(--smoke); font-size: 16px; line-height: 1.7;
  }

  /* SIDEBAR */
  .side {
    position: sticky; top: 96px; align-self: start;
    padding: 40px 36px; background: var(--carbon);
    border: 1px solid rgba(200,166,107,0.14);
  }
  .side h3 { font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; font-weight: 500; }
  .side .big-tel {
    display: block; padding: 22px 0; text-align: center;
    background: var(--gold); color: var(--obsidian);
    font-size: 20px; font-weight: 500; letter-spacing: 0.04em;
    margin-bottom: 14px; transition: all .4s var(--spring);
  }
  .side .big-tel:hover { background: var(--ivory); }
  .side .sub-btn {
    display: block; padding: 16px 0; text-align: center;
    border: 1px solid var(--gold); color: var(--ivory);
    font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase;
    transition: all .3s var(--spring);
  }
  .side .sub-btn:hover { background: var(--gold); color: var(--obsidian); }
  .side .divider { height: 1px; background: rgba(244,240,230,0.08); margin: 28px 0; }
  .side p { font-size: 13px; color: var(--smoke); line-height: 1.6; margin-bottom: 10px; }
  .side p strong { color: var(--ivory); font-weight: 500; }
  .trust-row { display: grid; grid-template-columns: auto 1fr; gap: 14px; margin-top: 18px; align-items: start; }
  .trust-ico { width: 28px; height: 28px; border: 1px solid var(--gold); color: var(--gold); display: grid; place-items: center; }
  .trust-row p { margin: 0; }
  .trust-row p strong { display: block; margin-bottom: 2px; font-size: 13px; }

  /* FOOTER */
  footer { padding: 56px 0 32px; border-top: 1px solid rgba(244,240,230,0.08); background: var(--carbon); text-align: center; color: var(--smoke); font-size: 12px; letter-spacing: 0.12em; }

  .loading { padding: 180px 0; text-align: center; color: var(--smoke); }

  @media (max-width: 1024px) {
    .d-grid { grid-template-columns: 1fr; }
    .gallery { grid-template-columns: 1fr; }
    .gallery .thumbs { grid-template-rows: none; grid-template-columns: repeat(4, 1fr); }
    .d-top { grid-template-columns: 1fr; }
    .d-top .price-box { text-align: left; }
    .spec-grid { grid-template-columns: repeat(2, 1fr); }
    .opts-list { grid-template-columns: 1fr; }
    .nav-links { display: none; }
    .side { position: static; }
  }
</style>
</head>
<body>

<nav class="top">
  <div class="row">
    <a href="/" class="brand">
      <span class="mark">S</span>
      <span class="brand-name"><strong>Suisse Cars</strong><span>PERFORMANCE</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="index.html#services">Services</a></li>
      <li><a href="vehicules.html">Véhicules</a></li>
      <li><a href="index.html#story">À propos</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <a href="tel:+41783151040" class="cta-btn solid">☎ +41 78 315 10 40</a>
  </div>
</nav>

<main id="content">
  <div class="loading">Chargement du véhicule…</div>
</main>

<footer>
  <div class="container">© <span id="year"></span> Suisse Cars Performance · Genève, Suisse</div>
</footer>

<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const id = new URLSearchParams(location.search).get('id');
  const content = document.getElementById('content');

  fetch('/vehicles.json').then(r => r.json()).then(data => {
    const v = data.vehicles.find(x => x.id === id) || data.vehicles[0];
    if (!v) { content.innerHTML = '<div class="loading">Véhicule introuvable. <a href="vehicules.html" style="color:var(--gold)">Retour au stock</a></div>'; return; }

    const imgs = v.images.concat(v.images, v.images, v.images).slice(0, 4);
    const opts = v.options.map(o => `<li>${o}</li>`).join('');
    const formatCHF = n => n.toLocaleString('fr-CH');
    const consoHp = v.power ? ` · ${Math.round(v.power*0.7355)} kW` : '';

    content.innerHTML = `
      <header class="detail-head">
        <div class="container">
          <div class="breadcrumb"><a href="/">Accueil</a> · <a href="vehicules.html">Véhicules</a> · ${v.brand} ${v.model}</div>
          <div class="d-top">
            <div>
              <div class="brand-line">${v.brand}</div>
              <h1>${v.model}</h1>
              <div class="meta">${v.year} · ${formatCHF(v.mileage)} km · ${v.fuel} · ${v.transmission} · ${v.location}</div>
            </div>
            <div class="price-box">
              <span class="lbl">Prix TTC</span>
              <span class="big">CHF ${formatCHF(v.price)}</span>
            </div>
          </div>
        </div>
      </header>

      <div class="container">
        <div class="gallery">
          <div class="main"><img id="main-img" src="${v.images[0]}" alt="${v.brand} ${v.model}" /></div>
          <div class="thumbs">
            ${imgs.map((src, i) => `<div class="t ${i===0?'on':''}" data-src="${src}"><img src="${src}" alt=""/></div>`).join('')}
          </div>
        </div>

        <div class="d-grid">
          <div>
            <section class="d-section">
              <h2>Fiche <em>technique</em></h2>
              <div class="spec-grid">
                <div class="spec-cell"><div class="l">Mise en circulation</div><div class="v">${v.firstRegistration}</div></div>
                <div class="spec-cell"><div class="l">Kilométrage</div><div class="v">${formatCHF(v.mileage)} km</div></div>
                <div class="spec-cell"><div class="l">Carburant</div><div class="v">${v.fuel}</div></div>
                <div class="spec-cell"><div class="l">Boîte</div><div class="v">${v.transmission}</div></div>
                <div class="spec-cell"><div class="l">Transmission</div><div class="v">${v.drive}</div></div>
                <div class="spec-cell"><div class="l">Puissance</div><div class="v">${v.power} ch${consoHp}</div></div>
                <div class="spec-cell"><div class="l">Cylindrée</div><div class="v">${formatCHF(v.displacement)} cm³</div></div>
                <div class="spec-cell"><div class="l">Consommation</div><div class="v">${v.consumption} L/100</div></div>
                <div class="spec-cell"><div class="l">CO₂</div><div class="v">${v.co2} g/km</div></div>
                <div class="spec-cell"><div class="l">Portes</div><div class="v">${v.doors}</div></div>
                <div class="spec-cell"><div class="l">Places</div><div class="v">${v.seats}</div></div>
                <div class="spec-cell"><div class="l">Couleur ext.</div><div class="v">${v.color}</div></div>
                <div class="spec-cell"><div class="l">Intérieur</div><div class="v">${v.interior}</div></div>
                <div class="spec-cell"><div class="l">N° châssis</div><div class="v" style="font-family:monospace;font-size:13px">${v.vin}</div></div>
                <div class="spec-cell"><div class="l">N° réception type</div><div class="v" style="font-family:monospace;font-size:13px">${v.typeApproval}</div></div>
              </div>
            </section>

            <section class="d-section">
              <h2>Équipements & <em>options</em></h2>
              <ul class="opts-list">${opts}</ul>
            </section>

            <section class="d-section">
              <h2>Description du <em>véhicule</em></h2>
              <div class="desc-box">${v.description}</div>
            </section>
          </div>

          <aside class="side">
            <h3>Intéressé ?</h3>
            <a class="big-tel" href="tel:+41783151040">☎ +41 78 315 10 40</a>
            <a class="sub-btn" href="index.html#contact">Demander un rappel</a>
            <div class="divider"></div>
            <p><strong>Essai possible sur rendez-vous</strong> au showroom de Genève. Financement et reprise étudiés sur place.</p>
            <div class="trust-row"><div class="trust-ico">✓</div><p><strong>Contrôle technique à jour</strong>Expertise cantonale Genève complète</p></div>
            <div class="trust-row"><div class="trust-ico">✓</div><p><strong>Garantie atelier</strong>12 mois sur les organes mécaniques</p></div>
            <div class="trust-row"><div class="trust-ico">✓</div><p><strong>Livraison possible</strong>Dans toute la Suisse et l'Europe</p></div>
          </aside>
        </div>
      </div>
    `;

    document.querySelectorAll('.thumbs .t').forEach(t => {
      t.addEventListener('click', () => {
        document.querySelectorAll('.thumbs .t').forEach(x => x.classList.remove('on'));
        t.classList.add('on');
        document.getElementById('main-img').src = t.dataset.src;
      });
    });
  }).catch(() => {
    content.innerHTML = '<div class="loading">Erreur de chargement.</div>';
  });
</script>
</body>
</html>
