<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A2540"/>
      <stop offset="100%" stop-color="#003D82"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>

  <!-- Spray gun icon stylized -->
  <g transform="translate(600, 430)" stroke="rgba(255,255,255,0.9)" stroke-width="3.5" fill="none" stroke-linecap="round">
    <!-- Handle -->
    <path d="M -60 40 L -60 120 Q -60 140 -40 140 L 20 140 Q 40 140 40 120 L 40 40"/>
    <!-- Trigger -->
    <path d="M -15 90 Q -30 90 -30 105 L -30 115 Q -30 125 -15 125"/>
    <!-- Paint cup -->
    <rect x="-30" y="-40" width="60" height="40" rx="4"/>
    <line x1="-30" y1="-20" x2="30" y2="-20"/>
    <!-- Nozzle -->
    <rect x="40" y="20" width="60" height="40" rx="3"/>
    <line x1="100" y1="30" x2="140" y2="30"/>
    <line x1="100" y1="50" x2="140" y2="50"/>
  </g>

  <!-- Paint splash -->
  <g transform="translate(800, 500)" fill="rgba(0,87,183,0.6)">
    <circle cx="0" cy="0" r="18"/>
    <circle cx="60" cy="-20" r="10"/>
    <circle cx="90" cy="30" r="14"/>
    <circle cx="140" cy="0" r="8"/>
    <circle cx="40" cy="50" r="6"/>
  </g>

  <!-- Car body outline corner -->
  <g transform="translate(200, 600)" opacity="0.3">
    <path d="M 0 100 Q 10 50 60 40 L 160 28 Q 200 0 260 0 L 340 0 Q 400 0 440 30 L 540 50 Q 580 60 580 100 L 0 100 Z" fill="rgba(255,255,255,0.5)"/>
  </g>

  <!-- Corner accents -->
  <g stroke="rgba(255,255,255,0.6)" stroke-width="2" fill="none">
    <path d="M 50 50 L 50 100 M 50 50 L 100 50"/>
    <path d="M 1150 50 L 1150 100 M 1150 50 L 1100 50"/>
    <path d="M 50 850 L 50 800 M 50 850 L 100 850"/>
    <path d="M 1150 850 L 1150 800 M 1150 850 L 1100 850"/>
  </g>

  <text x="600" y="150" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="18" font-weight="500" letter-spacing="10" fill="rgba(255,255,255,0.55)">CARROSSERIE</text>
  <text x="600" y="820" text-anchor="middle" font-family="'Outfit',system-ui,sans-serif" font-size="14" font-weight="300" letter-spacing="6" fill="rgba(255,255,255,0.5)">PHOTO À VENIR</text>
</svg>
